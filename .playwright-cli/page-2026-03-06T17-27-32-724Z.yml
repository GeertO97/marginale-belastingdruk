      - generic [ref=e222]:
        - heading "Kanttekeningen" [level=3] [ref=e223]
        - paragraph [ref=e224]: "Deze berekening toont alleen de marginale druk vanuit de inkomstenbelasting (Box 1) met arbeidskorting en algemene heffingskorting. In de praktijk zijn er meer factoren die de effectieve marginale druk beïnvloeden:"
        - list [ref=e225]:
          - listitem [ref=e226]:
            - strong [ref=e227]: Kinderbijslag / kindgebonden budget
            - text: — het kindgebonden budget wordt inkomensafhankelijk afgebouwd, wat de effectieve marginale druk voor ouders kan verhogen.
          - listitem [ref=e228]:
            - strong [ref=e229]: Hypotheekrenteaftrek (HRA)
            - text: — hypotheekrente is aftrekbaar tegen het basistarief (35,75%). Dit verlaagt de totale belastingdruk maar niet het marginale tarief op extra inkomen.
          - listitem [ref=e230]:
            - strong [ref=e231]: Zorgtoeslag / huurtoeslag
            - text: — deze toeslagen worden inkomensafhankelijk afgebouwd, wat de effectieve marginale druk bij lagere inkomens fors kan verhogen.
          - listitem [ref=e232]:
            - strong [ref=e233]: Inkomensafhankelijke bijdrage Zvw
            - text: — werkgevers betalen deze premie, maar bij DGA’s en zelfstandigen kan dit de marginale druk beïnvloeden.
          - listitem [ref=e234]:
            - strong [ref=e235]: MKB-winstvrijstelling
            - text: — voor ondernemers geldt een vrijstelling van 12,7% van de winst, waardoor het effectieve marginale tarief lager uitvalt.
