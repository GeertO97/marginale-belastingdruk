      - generic [ref=e222]:
        - heading "Caveats" [level=3] [ref=e329]
        - paragraph [ref=e224]: "This calculation only shows the marginal burden from income tax (Box 1) with the employment tax credit and general tax credit. In practice, more factors affect the effective marginal burden:"
        - list [ref=e225]:
          - listitem [ref=e226]:
            - strong [ref=e227]: Child benefit / child-related budget
            - text: — the child-related budget is phased out based on income, which can raise the effective marginal burden for parents.
          - listitem [ref=e228]:
            - strong [ref=e229]: Mortgage interest deduction
            - text: — mortgage interest is deductible at the base rate (35.75%). This lowers the total tax burden but not the marginal rate on extra income.
          - listitem [ref=e230]:
            - strong [ref=e231]: Healthcare / housing allowance
            - text: — these allowances are phased out based on income, which can substantially raise the effective marginal burden at lower incomes.
          - listitem [ref=e232]:
            - strong [ref=e233]: Income-dependent healthcare contribution (Zvw)
            - text: — employers pay this premium, but for director-shareholders and self-employed it can affect the marginal burden.
          - listitem [ref=e234]:
            - strong [ref=e235]: SME profit exemption
            - text: — entrepreneurs receive a 12.7% profit exemption, which effectively lowers the marginal rate.
